<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Aionyx Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;800&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"
    />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #020812;
        color: #e2f0ff;
        font-family: "Poppins", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .code {
        font-size: 6rem;
        font-weight: 800;
        background: linear-gradient(90deg, #38bdf8, #00f0ff);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
      }
      .msg {
        font-size: 1.1rem;
        color: #7eb4d4;
        margin: 16px 0 32px;
        font-weight: 300;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background: rgba(0, 240, 255, 0.1);
        border: 1px solid rgba(0, 240, 255, 0.3);
        border-radius: 100px;
        color: #38bdf8;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      a:hover {
        background: rgba(0, 240, 255, 0.18);
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div>
      <div class="code">404</div>
      <p class="msg">
        Halaman yang kamu cari tidak ada.<br />Mungkin sudah dipindah atau salah
        ketik URL.
      </p>
      <a href="https://aionyx-labs.github.io/aionyx-hub/"
        >← Kembali ke Aionyx Hub</a
      >
    </div>
  </body>
</html>
