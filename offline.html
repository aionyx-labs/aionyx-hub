<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline · Aionyx Hub</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #020812;
        color: #e2f0ff;
        font-family: "Poppins", sans-serif, system-ui;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .icon {
        font-size: 3.5rem;
        animation: pulse 2s ease-in-out infinite;
        margin-bottom: 20px;
      }
      .title {
        font-size: 1.4rem;
        font-weight: 700;
        color: #7dd3fc;
        margin-bottom: 10px;
      }
      .msg {
        font-size: 0.88rem;
        color: #7eb4d4;
        font-weight: 300;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        background: rgba(0, 240, 255, 0.1);
        border: 1px solid rgba(0, 240, 255, 0.3);
        border-radius: 100px;
        color: #38bdf8;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover {
        background: rgba(0, 240, 255, 0.18);
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
      }
      .auto-msg {
        margin-top: 20px;
        font-size: 0.72rem;
        color: #3a6080;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(0.92);
        }
      }
    </style>
  </head>
  <body>
    <div>
      <div class="icon">📡</div>
      <div class="title">Kamu Sedang Offline</div>
      <p class="msg">
        Tidak ada koneksi internet.<br />Cek jaringan kamu lalu coba lagi.
      </p>
      <button class="btn" id="btn-reload">↺ Coba Lagi</button>
      <p class="auto-msg">Halaman akan otomatis reload saat koneksi kembali.</p>
    </div>
    <script>
      document
        .getElementById("btn-reload")
        .addEventListener("click", () => location.reload());
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
